name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race ./... -v

  js-lint:
    name: JS syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check JS syntax
        run: |
          exit_code=0
          for f in $(find additions/juggler -name '*.js' -type f); do
            if ! node -c "$f" 2>/dev/null; then
              echo "Syntax error in $f"
              node -c "$f" || true
              exit_code=1
            fi
          done
          exit $exit_code
