name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Check module tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go mod tidy changed files" && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Build (linux)
        run: GOOS=linux GOARCH=amd64 go build -o vulpineos-linux ./cmd/vulpineos/

      - name: Build (darwin)
        run: GOOS=darwin GOARCH=arm64 go build -o vulpineos-darwin ./cmd/vulpineos/

      - name: Binary size check
        run: |
          size=$(stat -c%s vulpineos-linux 2>/dev/null || stat -f%z vulpineos-linux)
          echo "Binary size: $size bytes ($(echo "scale=1; $size/1048576" | bc)MB)"
          if [ "$size" -gt 26214400 ]; then
            echo "ERROR: Binary too large (>25MB)"
            exit 1
          fi

      - name: Unit tests with race detector
        run: |
          go test -race -v -count=1 ./cmd/... ./internal/... 2>&1 | tee test-output.txt

      - name: Validate test count
        run: |
          count=$(grep -c "^--- PASS" test-output.txt || echo "0")
          echo "Unit tests passing: $count"
          if [ "$count" -lt 210 ]; then
            echo "ERROR: Unit test count dropped below 210 (expected 265+)"
            exit 1
          fi

  js:
    name: JavaScript checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install web panel dependencies
        run: npm --prefix web ci

      - name: Check JS syntax
        run: |
          exit_code=0
          count=0
          for f in $(find additions/juggler -name '*.js' -type f); do
            count=$((count + 1))
            if ! node -c "$f" 2>/dev/null; then
              echo "Syntax error in $f"
              node -c "$f" || true
              exit_code=1
            fi
          done
          echo "Checked $count JS files"
          exit $exit_code

      - name: Check required patches
        run: |
          for p in patches/action-lock.patch; do
            if [ ! -f "$p" ]; then
              echo "ERROR: Missing required patch: $p"
              exit 1
            fi
          done
          echo "All required patches present"

      - name: Test and verify embedded web panel
        run: |
          npm --prefix web test -- --run
          npm --prefix web run build
          if ! git diff --exit-code -- cmd/vulpineos/panel; then
            echo "ERROR: embedded panel assets are stale. Run: npm --prefix web run build"
            exit 1
          fi
